<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f172a,#1d4ed8,#2563eb,#0ea5e9);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.flash{
    position:fixed;
    inset:0;
    background:white;
    animation:flash .5s forwards;
    pointer-events:none;
}
@keyframes flash{
    from{
        opacity:1;
    }
    to{
        opacity:0;
        visibility:hidden;
    }
}
.card{

    width:90%;
    max-width:430px;

    background:rgba(255,255,255,.16);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:45px;

    text-align:center;

    color:white;

    box-shadow:0 30px 70px rgba(0,0,0,.35);

    animation:pop .7s ease;

}
@keyframes pop{
0%{
    opacity:0;
    transform:scale(.6);
}
70%{
    transform:scale(1.05);
}
100%{
    opacity:1;
    transform:scale(1);
}
}
.loader{
width:70px;
height:70px;
margin:20px auto;
border-radius:50%;
border:7px solid rgba(255,255,255,.25);
border-top:7px solid white;
animation:spin 1s linear infinite;
}
@keyframes spin{
to{
    transform:rotate(360deg);
}
}
.badge{
display:inline-block;
padding:12px 28px;
border-radius:999px;
font-size:20px;
font-weight:700;
letter-spacing:2px;
animation:bounce .6s;
background:#22c55e;
box-shadow:0 0 25px rgba(34,197,94,.6);
}
@keyframes bounce{
0%{
    transform:scale(0);
}
60%{
    transform:scale(1.15);
}
80%{
    transform:scale(.95);
}
100%{
    transform:scale(1);
}
}
h1{
font-size:32px;
margin:22px 0 15px;
}
p{
font-size:17px;
line-height:1.8;
opacity:.95;
}
.footer{
margin-top:35px;
font-size:13px;
opacity:.65;
}
</style>
</head>
<body>
<div class="flash"></div>
<div class="card">
<div id="status"></div>
<div class="loader" id="loader"></div>
<h1 id="title">
Verifying Ticket...
</h1>
<p id="message">
Please wait while we verify your ticket.
</p>
<div class="footer">
Concert Ticket Booking System
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
setTimeout(function(){
document.getElementById("loader").style.display="none";
document.getElementById("status").innerHTML=
'<div class="badge">VERIFIED</div>';
document.getElementById("title").innerHTML=
"Booking Confirmed";
document.getElementById("message").innerHTML=
"Your ticket has been successfully verified. Enjoy the show!";
confetti({
particleCount:200,
spread:100,
origin:{
    y:0.6
}
});
},2200);
</script>
</body>
</html>
